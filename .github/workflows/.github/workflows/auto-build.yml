name: Auto organize & build README (Python + SQL, flat solutions)

on:
  push:
    paths:
      - '**/*.py'
      - '**/*.sql'
      - 'scripts/**'
      - 'README.md'
  workflow_dispatch: {}
  schedule:
    - cron: '0 3 * * 1' 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python scripts/organize_leethub.py
      - run: python scripts/generate_readme.py
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-organize solutions & update README"
          file_pattern: |
            solutions/**
            README.md
            .cache/leetcode_meta.json
